[FilterPlugin]
; Additional non-code files to stage when this plugin is packaged for distribution
; (e.g. via the editor "Package" action or RunUAT BuildPlugin). Code, Config/,
; Resources/ and Content/ are included automatically; everything below is extra.
; Paths are plugin-root-relative; "..." matches recursively.
;
; NOTE: the Steamworks SDK under Source/ThirdParty/ExtendedSteamLibrary/SDK is
; deliberately NOT listed here — Valve's SDK is not redistributable and each
; consumer must supply their own (see that folder's README.md).

